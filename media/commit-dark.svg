<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <title>AI Commit</title>
  <!-- Commit graph: two explicit solid nodes + arrow. Distinct from native $(git-commit) which is a single hollow ring with a center dot. -->
  <path d="M3 12C4.5 12 5.4 10.6 5.4 8.8C5.4 7 4.5 5.6 3 5.6" stroke="#c4a8ff" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M9.5 4C8 4 7.1 5.4 7.1 7.2C7.1 9 8 10.4 9.5 10.4" stroke="#c4a8ff" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M3 12L4.3 11M3 12L3.7 13.4" stroke="#c4a8ff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="3" cy="12" r="1.7" fill="#c4a8ff"/>
  <circle cx="9.5" cy="4" r="1.7" fill="#c4a8ff"/>
  <!-- AI sparkle marker, bottom-right so it does not collide with the nodes. -->
  <path d="M12.6 11.4l.5 1.2 1.2.5-1.2.5-.5 1.2-.5-1.2-1.2-.5 1.2-.5.5-1.2z" fill="#9ad7ff"/>
  <path d="M11 13.2l.25.6.6.25-.6.25-.25.6-.25-.6-.6-.25.6-.25.25-.6z" fill="#c4f0ff" opacity="0.9"/>
</svg>
